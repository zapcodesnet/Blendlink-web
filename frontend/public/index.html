        <!-- GLOBAL TOUCH SCROLL FIX v7 - Forces scroll to work on all elements -->
        <script>
        (function() {
            // 1. Force ALL addEventListener calls for touch events to be passive
            var origAdd = EventTarget.prototype.addEventListener;
            EventTarget.prototype.addEventListener = function(type, fn, opts) {
                if (type === 'touchstart' || type === 'touchmove' || type === 'pointerdown' || type === 'pointermove') {
                    if (typeof opts === 'object' && opts !== null) {
                        opts = Object.assign({}, opts, { passive: true });
                    } else {
                        opts = { capture: !!opts, passive: true };
                    }
                }
                return origAdd.call(this, type, fn, opts);
            };
            
            // 2. Add a capturing-phase touchmove listener that ensures scroll is never blocked
            // This runs BEFORE any other listener and cannot be stopped
            document.addEventListener('touchmove', function(e) {
                // Don't interfere - just ensure the event flows through
            }, { capture: true, passive: true });
            
            document.addEventListener('touchstart', function(e) {
                // Don't interfere - just ensure the event flows through
            }, { capture: true, passive: true });
            
            // 3. Override preventDefault on TouchEvent to make it a no-op for touch events
            // This is the nuclear option - no JS can block touch scrolling
            var origPreventDefault = Event.prototype.preventDefault;
            Event.prototype.preventDefault = function() {
                if (this.type === 'touchmove' || this.type === 'touchstart') {
                    // Silently ignore - allow scroll
                    return;
                }
                return origPreventDefault.call(this);
            };
            
            // 4. Ensure body/html never get overflow:hidden from JS
            document.addEventListener('DOMContentLoaded', function() {
                var observer = new MutationObserver(function() {
                    var b = document.body, h = document.documentElement;
                    if (b && b.style.overflow === 'hidden') b.style.overflow = '';
                    if (b && b.style.overflowY === 'hidden') b.style.overflowY = '';
                    if (h && h.style.overflow === 'hidden') h.style.overflow = '';
                    if (h && h.style.overflowY === 'hidden') h.style.overflowY = '';
                });
                observer.observe(document.body, { attributes: true, attributeFilter: ['style'] });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['style'] });
                
                // 5. Force touch-action on ALL elements via inline style
                // This overrides any CSS specificity issues
                function forceAllTouchAction() {
                    document.querySelectorAll('*').forEach(function(el) {
                        var ta = getComputedStyle(el).touchAction;
                        if (ta === 'none') {
                            el.style.touchAction = 'pan-y pan-x';
                        }
                    });
                }
                forceAllTouchAction();
                // Re-run periodically as React renders new elements
                setInterval(forceAllTouchAction, 3000);
            });
        })();
        </script>
